<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f4f7f6"><link rel="icon" type="image/png" href="../assets/icon-192.png"><title>Mesaha İO Güncelle</title><style>body{font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f7f6;color:#101828}.card{background:#fff;border:1px solid #d9e3e1;border-radius:24px;padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.12);text-align:center;max-width:390px;margin:16px}h1{font-size:22px;margin:0 0 8px}p{color:#667085;font-weight:700;line-height:1.45}.spin{width:44px;height:44px;margin:0 auto 14px;border-radius:50%;border:4px solid #d9e3e1;border-top-color:#22c55e;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}button{border:0;border-radius:14px;background:#16a34a;color:#fff;font-weight:900;padding:12px 16px;margin-top:12px}button[hidden]{display:none}.warn{color:#a16207}</style><script src="../release.js"></script><script>window.MesahaRelease&&window.MesahaRelease.use("mesaha");</script><script src="./js/mesaha-update-manager.js"></script></head><body><div class="card"><div class="spin" id="spin"></div><h1>Mesaha İO güncelleniyor…</h1><p id="status">Uygulama dosyaları indiriliyor ve etkinleştiriliyor. Kayıtlarınız ve ayarlarınız korunur.</p><button id="go" type="button" hidden>Ana Sayfayı Aç</button></div><script>(function(){var status=document.getElementById("status"),go=document.getElementById("go"),spin=document.getElementById("spin");function openApp(){var url=new URL("./index.html",location.href);url.searchParams.set("fresh",String(Date.now()));location.replace(url.href)}async function run(){try{status.textContent="Yeni uygulama dosyaları hazırlanıyor…";await window.MesahaUpdate.executeUpdatePage();status.textContent="Güncelleme tamamlandı. Uygulama açılıyor…";setTimeout(openApp,500)}catch(error){status.className="warn";status.textContent="Güncelleme tamamlanamadı. Önbellek onarılıyor…";try{await window.MesahaUpdate.repair();status.textContent="Onarım tamamlandı. Uygulama açılıyor…";setTimeout(openApp,700)}catch(_){spin.style.display="none";status.textContent="İşlem tamamlanamadı. Ana sayfayı açıp tekrar deneyin.";go.hidden=false}}}go.onclick=openApp;run()})();</script></body></html>
