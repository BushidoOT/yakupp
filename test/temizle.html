<!doctype html><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Suite temizleniyor</title><body style="font-family:system-ui;padding:24px"><h3>Test önbelleği temizleniyor…</h3><script>(async()=>{try{if('serviceWorker'in navigator){let r=await navigator.serviceWorker.getRegistrations();await Promise.all(r.map(x=>x.unregister()))}if('caches'in window){let k=await caches.keys();await Promise.all(k.filter(x=>x.indexOf('mesaha-suite-test-')===0).map(x=>caches.delete(x)))}}catch(e){}location.replace('./?v=3&clear=1')})()</script></body>
