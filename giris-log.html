<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Mesaha İO Giriş Logları</title>
<script src="./js/version.js"></script>
<script src="./js/mesaha-supabase-config.js"></script>
<script src="./js/mesaha-login-debug.js"></script>
<style>
:root{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#10251c;background:#f4fbf7}body{margin:0;padding:18px}.wrap{max-width:960px;margin:0 auto}.card{background:#fff;border:1px solid #d9eadf;border-radius:22px;padding:16px;box-shadow:0 12px 34px rgba(15,23,42,.08);margin-bottom:14px}h1{font-size:22px;margin:0 0 6px}p{margin:6px 0;color:#52645a;font-weight:700;line-height:1.45}.actions{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:9px;margin-top:12px}button,a.btn{min-height:46px;border-radius:14px;border:1px solid #cfe2d6;background:#fff;color:#123226;font-weight:950;font-size:14px;text-decoration:none;display:grid;place-items:center;cursor:pointer}.primary{background:#0d5f3b!important;color:#fff!important;border-color:#0d5f3b!important}.danger{background:#fff1f2!important;color:#be123c!important;border-color:#fecdd3!important}textarea{width:100%;height:55vh;box-sizing:border-box;border:1px solid #cfe2d6;border-radius:16px;padding:12px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;line-height:1.35;background:#fbfffd;color:#0f172a}.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#eaf7ef;color:#0d5f3b;font-weight:950;font-size:12px;margin:3px 5px 3px 0}.msg{font-weight:900;color:#0d5f3b;margin-top:8px}.warn{color:#991b1b}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Mesaha İO Giriş Logları</h1>
    <p>Bu sayfa Google/Supabase girişinde nerede takıldığını gösterir. Token ve şifre gibi hassas bilgiler otomatik gizlenir.</p>
    <div id="summary"></div>
    <div class="actions">
      <button class="primary" id="copyBtn">Logu kopyala</button>
      <button id="refreshBtn">Yenile</button>
      <button id="flushBtn">Supabase'e gönder</button>
      <button class="danger" id="clearBtn">Logları temizle</button>
      <a class="btn" href="./index.html">Uygulamaya dön</a>
    </div>
    <div class="msg" id="msg"></div>
  </div>
  <div class="card"><textarea id="out" spellcheck="false"></textarea></div>
</div>
<script>
(function(){
  function $(id){return document.getElementById(id)}
  function render(){
    var s=window.MesahaLoginLog&&MesahaLoginLog.summary?MesahaLoginLog.summary():{count:0,queued:0,last:[]};
    $('summary').innerHTML='<span class="pill">Toplam: '+s.count+'</span><span class="pill">Gönderilmeyi bekleyen: '+s.queued+'</span><span class="pill">Sürüm: '+((window.MESAHA_VERSION&&MESAHA_VERSION.visibleVersion)||'')+'</span>';
    $('out').value=window.MesahaLoginLog?MesahaLoginLog.text():'Log sistemi yüklenmedi.';
  }
  function msg(t,err){var m=$('msg');m.textContent=t||'';m.className='msg'+(err?' warn':'')}
  $('copyBtn').onclick=function(){MesahaLoginLog.copy().then(function(){msg('Log kopyalandı. Bana buraya yapıştırabilirsin.')}).catch(function(e){msg('Kopyalama olmadı: '+(e.message||e),true)})};
  $('refreshBtn').onclick=render;
  $('flushBtn').onclick=function(){MesahaLoginLog.flush().then(function(){msg('Gönderim denendi. SQL kurulmadıysa sadece cihaz içinde kalır.');render()}).catch(function(e){msg('Gönderilemedi: '+(e.message||e),true);render()})};
  $('clearBtn').onclick=function(){if(confirm('Giriş logları temizlensin mi?')){MesahaLoginLog.clear();render();msg('Loglar temizlendi.')}};
  render();setInterval(render,3500);
})();
</script>
</body>
</html>
