name: Apply test3 v345 fix

on:
  push:
    paths:
      - ".github/workflows/apply-test3-v345-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-test3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Patch test3 files
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json, re

          BUILD = 345
          VERSION = 'v345-dark-theme-update-alert-fix'
          CACHE = 'mesaha-app-v345-dark-theme-update-alert-fix'
          DISPLAY = 'V3.38 •ExelanceX•'
          APP = 'V3.38'
          BUILT = '2026-06-22T03:00:00+03:00'
          NOTES = 'Karanlık tema butonu tek ve sağlam bağlayıcıya alındı; eski v339/v340 sürüm izleri temizlendiği için sürekli yeni sürüm uyarısı düzeltildi.'
          meta = {
              'app': APP,
              'version': VERSION,
              'build': BUILD,
              'visibleVersion': DISPLAY,
              'shortVersion': DISPLAY,
              'name': 'Mesaha İO ' + DISPLAY,
              'cacheName': CACHE,
              'builtAt': BUILT,
              'notes': NOTES,
              'assetVersion': str(BUILD),
          }
          root = Path('test3')
          (root / 'version.json').write_text(json.dumps(meta, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          (root / 'js' / 'version.js').write_text('self.MESAHA_VERSION = ' + json.dumps(meta, ensure_ascii=False, indent=2) + ';\n', encoding='utf-8')

          swp = root / 'service-worker.js'
          sw = swp.read_text(encoding='utf-8')
          sw = re.sub(r"importScripts\('\./js/version\.js\?v=\d+'\);", f"importScripts('./js/version.js?v={BUILD}');", sw)
          sw = re.sub(r"const CACHE_NAME = \(self\.MESAHA_VERSION && self\.MESAHA_VERSION\.cacheName\) \|\| '[^']+';", f"const CACHE_NAME = (self.MESAHA_VERSION && self.MESAHA_VERSION.cacheName) || '{CACHE}';", sw)
          sw = re.sub(r"'\./js/version\.js\?v=\d+'", f"'./js/version.js?v={BUILD}'", sw)
          swp.write_text(sw, encoding='utf-8')

          p = root / 'index.html'
          html = p.read_text(encoding='utf-8')
          meta_js = json.dumps(meta, ensure_ascii=False)
          html = re.sub(r'<title>.*?</title>', f'<title>Mesaha İO {DISPLAY}</title>', html, count=1)
          html = re.sub(r"const info = \{\"app\": \"V3\.38\".*?\};", f"const info = {meta_js};", html, count=1)
          html = re.sub(r"var info=\{\"app\": \"V3\.38\".*?\};", f"var info={meta_js};", html, count=1)
          html = re.sub(
              r"var versionInfo=\{app:STABLE_VISIBLE,version:'[^']+',build:\d+,visibleVersion:STABLE_VISIBLE,shortVersion:STABLE_VISIBLE,name:'Mesaha İO '\+STABLE_VISIBLE,cacheName:'[^']+',assetVersion:'\d+'\};",
              f"var versionInfo={{app:'{APP}',version:'{VERSION}',build:{BUILD},visibleVersion:STABLE_VISIBLE,shortVersion:STABLE_VISIBLE,name:'Mesaha İO '+STABLE_VISIBLE,cacheName:'{CACHE}',assetVersion:'{BUILD}'}};",
              html,
              count=1,
          )
          html = re.sub(
              r"window\.MESAHA_VERSION=\{app:'V3\.38',version:'[^']+',build:BUILD,visibleVersion:DISPLAY,shortVersion:DISPLAY,name:'Mesaha İO '\+DISPLAY,cacheName:'[^']+',assetVersion:String\(BUILD\)\};",
              f"window.MESAHA_VERSION={{app:'{APP}',version:'{VERSION}',build:BUILD,visibleVersion:DISPLAY,shortVersion:DISPLAY,name:'Mesaha İO '+DISPLAY,cacheName:'{CACHE}',assetVersion:String(BUILD)}};",
              html,
          )
          html = re.sub(
              r"window\.MESAHA_VERSION=\{app:APP,version:'[^']+',build:BUILD,visibleVersion:DISPLAY,shortVersion:DISPLAY,name:'Mesaha İO '\+DISPLAY,cacheName:'[^']+',assetVersion:String\(BUILD\)\};",
              f"window.MESAHA_VERSION={{app:APP,version:'{VERSION}',build:BUILD,visibleVersion:DISPLAY,shortVersion:DISPLAY,name:'Mesaha İO '+DISPLAY,cacheName:'{CACHE}',assetVersion:String(BUILD)}};",
              html,
          )
          html = re.sub(
              r"var DISPLAY='V3\.38 •ExelanceX•', APP='V3\.38', BUILD=\d+, VERSION='[^']+', CACHE='[^']+';",
              f"var DISPLAY='{DISPLAY}', APP='{APP}', BUILD={BUILD}, VERSION='{VERSION}', CACHE='{CACHE}';",
              html,
          )
          html = html.replace('var BUILD=340;\n  var SOUND_VERSION=\'340\';', "var BUILD=345;\n  var SOUND_VERSION='345';")
          html = html.replace('var BUILD=340;\n  var info=', f'var BUILD={BUILD};\n  var info=')
          html = html.replace('var BUILD=344;', f'var BUILD={BUILD};')
          html = html.replace("var SOUND_VERSION='335';", f"var SOUND_VERSION='{BUILD}';")
          html = html.replace("version:'v330-ui-fix'", f"version:'{VERSION}'")

          fix = f'''

          <style id="mesaha-v345-dark-theme-update-alert-fix-style">
          #themeBtn{{display:grid!important;visibility:visible!important;opacity:1!important;pointer-events:auto!important;z-index:999!important;place-items:center!important;}}
          body.dark #themeBtn{{background:#15191f!important;border-color:#35404a!important;color:#f6c84c!important;}}
          </style>
          <script id="mesaha-v345-dark-theme-update-alert-fix-script">
          (function(){{
            'use strict';
            var META={meta_js};
            var SETTINGS_KEY='cam_mesaha_ayarlar_v1';
            var THEME_KEY='mesaha_theme_v342';
            function $(id){{return document.getElementById(id);}}
            function qsa(sel,root){{return Array.prototype.slice.call((root||document).querySelectorAll(sel));}}
            function publishVersion(){{
              window.MESAHA_VERSION=META;
              window.MESAHA_VERSION_TEXT=META.visibleVersion;
              window.MESAHA_VERSION_SHORT=META.shortVersion;
              document.title='Mesaha İO '+META.visibleVersion;
              var apple=document.querySelector('meta[name="apple-mobile-web-app-title"]'); if(apple) apple.setAttribute('content',META.app);
              var vt=$('versionText'); if(vt) vt.textContent=META.shortVersion;
              qsa('.version-card b').forEach(function(b){{b.textContent=META.shortVersion;}});
              qsa('.version-card small').forEach(function(s){{s.textContent='';}});
              var st=document.querySelector('#startup strong'); if(st) st.textContent=META.shortVersion;
            }}
            function readTheme(){{
              try{{var a=localStorage.getItem(THEME_KEY); if(a==='dark'||a==='light') return a;}}catch(e){{}}
              try{{var s=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{{}}'); if(s.theme==='dark'||s.theme==='light') return s.theme;}}catch(e){{}}
              try{{var ws=window.state&&window.state.settings&&window.state.settings.theme; if(ws==='dark'||ws==='light') return ws;}}catch(e){{}}
              return document.body.classList.contains('dark')?'dark':'light';
            }}
            function persistTheme(mode){{
              try{{localStorage.setItem(THEME_KEY,mode);}}catch(e){{}}
              try{{var s=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{{}}'); s.theme=mode; localStorage.setItem(SETTINGS_KEY,JSON.stringify(s));}}catch(e){{}}
              try{{if(window.state&&window.state.settings) window.state.settings.theme=mode;}}catch(e){{}}
            }}
            function setIcon(){{
              var btn=$('themeBtn'); if(!btn) return;
              var dark=document.body.classList.contains('dark');
              btn.textContent=dark?'☀':'🌙';
              btn.setAttribute('title',dark?'Aydınlık moda geç':'Karanlık moda geç');
              btn.setAttribute('aria-label',btn.getAttribute('title'));
            }}
            function applyTheme(mode){{
              var dark=mode==='dark';
              document.body.classList.toggle('dark',dark);
              persistTheme(dark?'dark':'light');
              setIcon();
            }}
            function cleanThemeButton(){{
              var top=document.querySelector('.topbar'); if(!top) return;
              var old=$('themeBtn');
              if(!old){{ old=document.createElement('button'); old.id='themeBtn'; old.className='icon-btn'; old.type='button'; top.appendChild(old); }}
              var btn=old;
              if(!btn.__v345Clean){{
                var clone=btn.cloneNode(true);
                clone.__v345Clean=true;
                clone.__v342DarkBound=true;
                clone.id='themeBtn';
                clone.className=btn.className || 'icon-btn';
                clone.type='button';
                btn.parentNode.replaceChild(clone,btn);
                btn=clone;
              }} else {{ btn.__v342DarkBound=true; }}
              btn.style.display='grid';
              btn.style.visibility='visible';
              btn.style.opacity='1';
              btn.style.pointerEvents='auto';
              if(!btn.__v345Bound){{
                btn.__v345Bound=true;
                btn.addEventListener('click',function(ev){{
                  ev.preventDefault();
                  ev.stopImmediatePropagation();
                  applyTheme(document.body.classList.contains('dark')?'light':'dark');
                  return false;
                }},true);
              }}
              setIcon();
            }}
            function boot(){{
              publishVersion();
              applyTheme(readTheme());
              cleanThemeButton();
            }}
            boot();
            if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot,{{once:true}});
            [80,250,700,1500,3000,5000].forEach(function(ms){{setTimeout(boot,ms);}});
            setInterval(function(){{publishVersion(); cleanThemeButton();}},2500);
            window.mesahaV345Fix={{publishVersion:publishVersion,applyTheme:applyTheme,cleanThemeButton:cleanThemeButton}};
          }})();
          </script>
          '''
          if 'mesaha-v345-dark-theme-update-alert-fix-script' not in html:
              html = html.replace('\n</body>\n</html>', fix + '\n</body>\n</html>')
          p.write_text(html, encoding='utf-8')
          PY
      - name: Commit patched files and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/apply-test3-v345-fix.yml
          git add test3/index.html test3/version.json test3/js/version.js test3/service-worker.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply test3 v345 dark theme fix"
            git push
          fi
