<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#f4f7f6"><title>Mesaha İO Güncelle</title><style>body{font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f7f6;color:#101828}.card{background:#fff;border:1px solid #d9e3e1;border-radius:24px;padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.12);text-align:center;max-width:390px}h1{font-size:22px;margin:0 0 8px}p{color:#667085;font-weight:700;line-height:1.45}.spin{width:44px;height:44px;margin:0 auto 14px;border-radius:50%;border:4px solid #d9e3e1;border-top-color:#22c55e;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}button{border:0;border-radius:14px;background:#16a34a;color:#fff;font-weight:900;padding:12px 16px;margin-top:12px}</style><script src="./js/version.js"></script></head><body><div class="card"><div class="spin"></div><h1>Mesaha İO güncelleniyor…</h1><p>Eski sürüm önbelleği temizleniyor. Kayıtlar ve ayarlar silinmez.</p><button id="go" type="button">Ana Sayfayı Aç</button></div><script>(function(){function setText(t){try{document.querySelector('p').textContent=t;}catch(e){}}function go(){setTimeout(function(){location.replace('./index.html?updated='+(new Date().getTime()));},700)}function keys(){try{var v=(window.MESAHA_VERSION&&window.MESAHA_VERSION.version)||'v512_panel_bos_kayit_temizligi';var b=String((window.MESAHA_VERSION&&window.MESAHA_VERSION.build)||512);localStorage.setItem('mesaha_force_update_bridge',b);localStorage.setItem('mesaha_last_seen_version',v);localStorage.setItem('mesaha_current_version',v);localStorage.setItem('mesaha_cache_repair_current',String(Date.now()));}catch(e){}}function clean(){keys();var jobs=[];try{if('serviceWorker' in navigator){jobs.push(navigator.serviceWorker.getRegistrations().then(function(regs){return Promise.all(regs.map(function(r){return r.unregister().catch(function(){});}));}).catch(function(){}));}}catch(e){}try{if('caches' in window){jobs.push(caches.keys().then(function(list){return Promise.all(list.map(function(k){return caches.delete(k);}));}).catch(function(){}));}}catch(e){}try{Promise.all(jobs).then(function(){keys();setText('Temizlik tamamlandı. Ana sayfa açılıyor…');go();}).catch(function(){keys();go();});}catch(e){keys();go();}}try{document.getElementById('go').onclick=function(){clean();};}catch(e){}clean();})();</script></body></html>
