  <style>
    :root{

  function emptyForest(){return `<svg viewBox="0 0 220 140" width="100%" height="100%"><path d="M0 107c38-42 67-45 99-7 30-33 65-39 121 7v33H0z" fill="#bddfce"/><path d="M112 20 83 78h20l-27 42h74l-27-42h19z" fill="#2a9a62" opacity=".55"/><path d="M58 48 40 82h13l-20 30h51L64 82h13z" fill="#0f6b42" opacity=".35"/><path d="M165 54c20 0 34 14 34 32s-14 32-34 32-34-14-34-32 14-32 34-32Z" fill="#7cc49c" opacity=".35"/><path d="M165 75v46M151 91l14 9 18-18" stroke="#0f6b42" stroke-width="3" opacity=".45"/></svg>`}
  function volume(cap,boy){const c=parseFloat(String(cap).replace(',','.'))||0; const b=parseFloat(String(boy).replace(',','.'))||0; if(!c||!b)return 0; return Math.PI*Math.pow(c/100,2)/4*b;}
  function fmtM3(n){return (Math.round(n*1000)/1000).toLocaleString('tr-TR',{minimumFractionDigits:n?3:0,maximumFractionDigits:3})}
  function todayTR(){return new Date(state.file.date||Date.now()).toLocaleDateString('tr-TR')}
  function pInfo(name){return products.find(p=>p.name===name)||products[0]}
  function totals(records=state.records){
    const totalM3 = records.reduce((a,r)=>a+(+r.hacimM3||0),0);
    const by = {}; products.forEach(p=>by[p.name]={adet:0,m3:0}); records.forEach(r=>{if(by[r.odunTuru]){by[r.odunTuru].adet++;by[r.odunTuru].m3 += +r.hacimM3||0}});
    return {count:records.length,totalM3,by};
  }

  }
  function downloadFile(filename,content,type='application/json'){

  function renderMaintenance(){
    const t=totals(); const today=new Date().toISOString().slice(0,10); const todays=state.records.filter(r=>String(r.tarih).slice(0,10)===today); const tt=totals(todays); const last=state.records[state.records.length-1];

  }

  function bind(){

    $$('[data-records]').forEach(b=>b.onclick=()=>setView('records'));

    $$('[data-cache]').forEach(b=>b.onclick=()=>{if('caches' in window){caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)))} toast('Ön bellek temizlendi.');});
    $$('[data-filter]').forEach(b=>b.onclick=()=>{state.filter=b.dataset.filter;save();render();});

    $$('[data-fast-product]').forEach(b=>b.onclick=()=>{state.fast.product=b.dataset.fastProduct;save();render();});
    $$('[data-fast-tree]').forEach(b=>b.onclick=()=>{state.fast.tree=b.dataset.fastTree;save();render();});
    $$('[data-cap]').forEach(b=>b.onclick=()=>{state.fast.cap=b.dataset.cap;save();render();});

    $$('[data-save-record]').forEach(b=>b.onclick=saveRecord);
    $$('[data-export]').forEach(b=>b.onclick=()=>{
      const rows=[['Barkod','Odun Türü','Ağaç Türü','Çap','Boy','Hacim m3','Tarih'],...state.records.map(r=>[r.barkod,r.odunTuru,r.agacTuru,r.cap,r.boy,fmtM3(r.hacimM3),r.tarih])];
      const html='<html><head><meta charset="utf-8"></head><body><table border="1">'+rows.map(row=>'<tr>'+row.map(c=>'<td>'+String(c).replace(/[<>&]/g,s=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[s]))+'</td>').join('')+'</tr>').join('')+'</table></body></html>';

    $$('[data-filter-panel]').forEach(b=>b.onclick=()=>toast('Filtreler hazır. Ürün çiplerinden seçim yapabilirsin.'));
    $$('[data-edit-file]').forEach(b=>b.onclick=()=>toast('Dosya bilgilerini aşağıdaki alanlardan düzenleyebilirsin.'));
    $$('[data-action="online"]').forEach(b=>b.onclick=()=>toast('Çevrim içi: Veriler cihazınızda güvende.'));
  }
  function saveRecord(){
    const f=state.fast; const barkod=(f.barkod||`A${Math.floor(10000000+Math.random()*89999999)}`).trim();
    const rec={id:crypto.randomUUID?crypto.randomUUID():String(Date.now()),barkod,odunTuru:f.product,agacTuru:f.tree,cap:f.cap,boy:f.boy,hacimM3:volume(f.cap,String(f.boy).replace('B','')),tarih:new Date().toISOString(),bolmeNo:state.file.bolmeNo,seflik:state.file.seflik,notEkip:state.file.note};
    state.records.push(rec); state.fast.barkod=''; save(); render(); setTimeout(()=>{const i=$('[data-fast="barkod"]'); if(i)i.focus({preventScroll:true});},60); toast(`${rec.barkod} ${rec.cap}Ç ${rec.boy}B ${rec.odunTuru} eklendi`);
  }
  window.addEventListener('load',()=>{render(); if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js').catch(()=>{})}});
  </script>
</body>
</html>
