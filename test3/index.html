<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<meta name="theme-color" content="#08090b" />

<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./assets/icon-192.png" />
<style>
html,body{margin:0;min-height:100vh;background:#08090b;color:#e5e7eb;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{display:grid;place-items:center;padding:24px}.card{max-width:390px;border:1px solid #262b33;border-radius:24px;background:#111318;box-shadow:0 24px 70px rgba(0,0,0,.45);padding:24px;text-align:center}.logo{width:54px;height:54px;border-radius:18px;margin:0 auto 12px;display:grid;place-items:center;background:#151a21;border:1px solid #303842;color:#22c55e;font-weight:1000}h1{font-size:22px;margin:0 0 8px}p{margin:0;color:#aeb6c2;font-weight:800;line-height:1.45}.err{color:#fecaca;margin-top:12px;white-space:pre-wrap;font-size:13px}
</style>
</head>
<body>
<div class="card"><div class="logo">İO</div><h1>Mesaha İO V3.39</h1><p>Yeni sürüm yükleniyor, eski ön bellek temizleniyor…</p><div id="err" class="err"></div></div>
<script>
(async function(){
  'use strict';
  const META={app:'V3.39',version:'v347-final-dark-version-fix',build:347,visibleVersion:'V3.39 •ExelanceX•',shortVersion:'V3.39 •ExelanceX•',name:'Mesaha İO V3.39 •ExelanceX•',cacheName:'mesaha-app-v347-final-dark-version-fix',assetVersion:'347'};
  const SOURCES=[
    'https://raw.githubusercontent.com/BushidoOT/yakupp/468d076d25553d5176d8accc95f7d0535f66c888/test3/index.html',
    'https://cdn.jsdelivr.net/gh/BushidoOT/yakupp@468d076d25553d5176d8accc95f7d0535f66c888/test3/index.html'
  ];
  function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
  async function getSource(){
    let last=null;
    for(const url of SOURCES){
      try{const r=await fetch(url,{cache:'no-store'}); if(r.ok) return await r.text(); last=new Error('HTTP '+r.status)}catch(e){last=e}
    }
    throw last||new Error('Kaynak dosya alınamadı');
  }
  function headFix(){
    return `<script id="mesaha-v347-head-fix">(function(){try{var META=${JSON.stringify(META)};window.MESAHA_VERSION=META;window.MESAHA_VERSION_TEXT=META.visibleVersion;window.MESAHA_VERSION_SHORT=META.shortVersion;localStorage.setItem('mesaha_last_seen_version',META.version);localStorage.setItem('mesaha_current_version',META.version);localStorage.setItem('mesaha_last_update_check',String(Date.now()));var old=window.alert;window.alert=function(m){if(/yeni\\s*sürüm|güncelleme|update/i.test(String(m||'')))return;return old.apply(this,arguments)}}catch(e){}})();<\/script>`;
  }
  function bodyFix(){
    const meta=JSON.stringify(META).replace(/</g,'\\u003c');
    return `<style id="mesaha-v347-dark-css">
:root{color-scheme:light dark}body.dark{background:#08090b!important;color:#e5e7eb!important}body.dark .app,body.dark .wrap,body.dark main,body.dark .page{background:#08090b!important;color:#e5e7eb!important}body.dark .card,body.dark .panel,body.dark .box,body.dark .section,body.dark .modal,body.dark .sheet,body.dark .summary-card,body.dark .record-card,body.dark .glass,body.dark .info-card{background:#111318!important;border-color:#2b3038!important;color:#e5e7eb!important;box-shadow:0 14px 42px rgba(0,0,0,.34)!important}body.dark .topbar,body.dark header,body.dark .hero{background:linear-gradient(180deg,#101318,#08090b)!important;border-color:#262b33!important;color:#f3f4f6!important}body.dark input,body.dark select,body.dark textarea{background:#0d0f13!important;border-color:#303842!important;color:#f9fafb!important}body.dark button{border-color:#303842}body.dark .muted,body.dark small,body.dark .sub,body.dark .hint{color:#aeb6c2!important}body.dark table,body.dark th,body.dark td{background:#111318!important;color:#e5e7eb!important;border-color:#2b3038!important}body.dark #themeBtn{display:grid!important;visibility:visible!important;opacity:1!important;pointer-events:auto!important;place-items:center!important;background:#15191f!important;border-color:#35404a!important;color:#f6c84c!important}
</style><script id="mesaha-v347-final-fix">(function(){'use strict';var META=${meta};var SETTINGS_KEY='cam_mesaha_ayarlar_v1',THEME_KEY='mesaha_theme_v342';function $(id){return document.getElementById(id)}function q(sel,root){return Array.prototype.slice.call((root||document).querySelectorAll(sel))}function saveTheme(m){try{localStorage.setItem(THEME_KEY,m)}catch(e){}try{var s=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}');s.theme=m;localStorage.setItem(SETTINGS_KEY,JSON.stringify(s))}catch(e){}try{if(window.state&&window.state.settings)window.state.settings.theme=m}catch(e){}}function icon(){var b=$('themeBtn');if(!b)return;var d=document.body.classList.contains('dark');b.textContent=d?'☀':'🌙';b.title=d?'Aydınlık moda geç':'Karanlık moda geç';b.setAttribute('aria-label',b.title)}function apply(m){document.body.classList.toggle('dark',m==='dark');saveTheme(m==='dark'?'dark':'light');icon()}function read(){try{var a=localStorage.getItem(THEME_KEY);if(a==='dark'||a==='light')return a}catch(e){}try{var s=JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}');if(s.theme==='dark'||s.theme==='light')return s.theme}catch(e){}return document.body.classList.contains('dark')?'dark':'light'}function bind(){var top=document.querySelector('.topbar,header,.hero')||document.body;var b=$('themeBtn');if(!b){b=document.createElement('button');b.id='themeBtn';b.className='icon-btn';b.type='button';top.appendChild(b)}if(!b.__v347){var c=b.cloneNode(true);c.__v347=true;c.id='themeBtn';c.type='button';b.parentNode.replaceChild(c,b);b=c;b.addEventListener('click',function(ev){ev.preventDefault();ev.stopImmediatePropagation();apply(document.body.classList.contains('dark')?'light':'dark');return false},true)}b.style.setProperty('display','grid','important');b.style.setProperty('visibility','visible','important');b.style.setProperty('opacity','1','important');b.style.setProperty('pointer-events','auto','important');icon()}function version(){window.MESAHA_VERSION=META;window.MESAHA_VERSION_TEXT=META.visibleVersion;window.MESAHA_VERSION_SHORT=META.shortVersion;document.title='Mesaha İO '+META.visibleVersion;try{localStorage.setItem('mesaha_last_seen_version',META.version);localStorage.setItem('mesaha_current_version',META.version);localStorage.setItem('mesaha_last_update_check',String(Date.now()))}catch(e){}var apple=document.querySelector('meta[name="apple-mobile-web-app-title"]');if(apple)apple.content=META.app;var vt=$('versionText');if(vt)vt.textContent=META.shortVersion;q('.version-card b,.app-version,b').forEach(function(x){if(/V3\.|ExelanceX|Mesaha/.test(x.textContent||''))x.textContent=META.shortVersion});q('.version-card small').forEach(function(x){x.textContent=''})}function killUpdate(){q('div,section,dialog,aside').forEach(function(x){var t=(x.textContent||'').toLowerCase();if(t.includes('yeni sürüm')&&t.includes('var')&&x.offsetParent!==null){x.style.display='none'}})}function boot(){version();apply(read());bind();killUpdate()}boot();if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',boot,{once:true});[80,250,700,1500,3000,5000].forEach(function(ms){setTimeout(boot,ms)});setInterval(boot,2500)})();<\/script>`;
  }
  function patch(html){
    const meta=JSON.stringify(META);
    html=html.replace(/<title>.*?<\/title>/i,'<title>Mesaha İO '+META.visibleVersion+'</title>');
    html=html.replace(/<meta name="apple-mobile-web-app-title" content="[^"]*"\s*\/?>/i,'<meta name="apple-mobile-web-app-title" content="'+META.app+'" />');
    html=html.replace(/const info = \{"app": "V3\.[^"]+"[\s\S]*?\};/,'const info = '+meta+';');
    html=html.replace(/var info=\{"app": "V3\.[^"]+"[\s\S]*?\};/,'var info='+meta+';');
    html=html.replace(/V3\.35 •ExelanceX•/g,META.visibleVersion).replace(/V3\.38 •ExelanceX•/g,META.visibleVersion).replace(/V3\.35/g,META.app).replace(/V3\.38/g,META.app);
    html=html.replace(/var BUILD=\d+;/g,'var BUILD='+META.build+';').replace(/var SOUND_VERSION='\d+';/g,"var SOUND_VERSION='"+META.assetVersion+"';");
    html=html.replace(/version:'v330-ui-fix'/g,"version:'"+META.version+"'").replace(/fileVersion:'v330-ui-fix'/g,"fileVersion:'"+META.version+"'");
    html=html.replace(/<head>/i,'<head>'+headFix());
    html=html.includes('</body>')?html.replace('</body>',bodyFix()+'\n</body>'):html+bodyFix();
    return html;
  }
  try{
    try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}}catch(e){}
    try{if('caches'in window){const keys=await caches.keys();await Promise.all(keys.filter(k=>k.startsWith('mesaha-app-')).map(k=>caches.delete(k)))}}catch(e){}
    const html=patch(await getSource());
    document.open();document.write(html);document.close();
  }catch(e){
    const el=document.getElementById('err'); if(el) el.textContent='Yükleme hatası: '+(e&&e.message?e.message:e);
  }
})();
</script>
</body>
</html>
