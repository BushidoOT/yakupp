<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mesaha İO Temizle</title><style>body{font-family:system-ui;margin:0;min-height:100vh;display:grid;place-items:center;background:#eef8f2;color:#0d5f3b}.card{background:white;border:1px solid #dcebe4;border-radius:24px;padding:24px;box-shadow:0 20px 60px rgba(8,37,24,.16);text-align:center;max-width:360px}h1{font-size:22px;margin:0 0 8px}p{color:#60726a;font-weight:700}.spin{width:44px;height:44px;margin:0 auto 14px;border-radius:50%;border:4px solid #dcebe4;border-top-color:#0d5f3b;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div class="card"><div class="spin"></div><h1>Ön bellek temizleniyor…</h1><p>Eski sürüm kapatılıp yeni sürüm açılıyor. Lütfen bekleyin.</p></div><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}}catch(e){}try{if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)))}}catch(e){}setTimeout(()=>location.replace('./index.html?v=333&fresh='+Date.now()),800)})();</script></body></html>
