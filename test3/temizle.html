<link rel="apple-touch-icon" href="./assets/icon-192.png"/><title>Mesaha İO Temizle V3.57</title><style>body{font-family:system-ui;margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f7f6;color:#101828}.card{background:#fff;border:1px solid #d9e3e1;border-radius:24px;padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.12);text-align:center;max-width:360px}h1{font-size:22px;margin:0 0 8px}p{color:#667085;font-weight:700}.spin{width:44px;height:44px;margin:0 auto 14px;border-radius:50%;border:4px solid #d9e3e1;border-top-color:#22c55e;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style></head><body><div class="card"><div class="spin"></div><h1>Ön bellek temizleniyor…</h1><p>Eski tema ve cache temizleniyor, V3.57 açılıyor.</p></div><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}}catch(e){}try{if('caches'in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)))}}catch(e){}try{localStorage.setItem('mesaha_last_seen_version','v366-terminal-save-touch-fix');localStorage.setItem('mesaha_current_version','v366-terminal-save-touch-fix')}catch(e){}setTimeout(()=>location.replace('./index.html?v=366&fresh='+Date.now()),800)})();</script></body></html>
