<!doctype html>
<html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#f4f7f6"><link rel="icon" type="image/png" href="./assets/icon-192.png"><title>Mesaha İO Güncelle</title>
<style>body{font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f7f6;color:#101828}.card{background:#fff;border:1px solid #d9e3e1;border-radius:24px;padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.12);text-align:center;max-width:390px;margin:16px}h1{font-size:22px;margin:0 0 8px}p{color:#667085;font-weight:700;line-height:1.45}.spin{width:44px;height:44px;margin:0 auto 14px;border-radius:50%;border:4px solid #d9e3e1;border-top-color:#22c55e;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}button{border:0;border-radius:14px;background:#16a34a;color:#fff;font-weight:900;padding:12px 16px;margin-top:12px}button[hidden]{display:none}</style>
<script src="./js/version.js?v=556"></script><script src="./js/mesaha-update-manager-v527.js?v=556"></script></head>
<body><div class="card"><div class="spin" id="spin"></div><h1>Mesaha İO güncelleniyor…</h1><p id="status">Yeni sürüm indiriliyor ve etkinleştiriliyor. Kayıtlarınız ve ayarlarınız korunur.</p><button id="go" type="button" hidden>Ana Sayfayı Aç</button></div>
<script>
(function(){
  var status=document.getElementById('status'),go=document.getElementById('go'),spin=document.getElementById('spin');
  function openApp(build){var u=new URL('./index.html',location.href);u.searchParams.set('updated',String(build||Date.now()));u.searchParams.set('fresh',String(Date.now()));location.replace(u.href);}
  async function run(){
    try{
      status.textContent='Yeni uygulama dosyaları hazırlanıyor…';
      var result=window.MesahaUpdateV527?await window.MesahaUpdateV527.executeUpdatePage():null;
      var build=result&&result.targetBuild||(window.MESAHA_VERSION&&window.MESAHA_VERSION.build)||556;
      status.textContent='Güncelleme tamamlandı. V5.63 •Yakupp• açılıyor…';
      setTimeout(function(){openApp(build);},500);
    }catch(e){
      spin.style.display='none';
      status.textContent='Güncelleme tamamlanamadı: '+String(e&&e.message||e)+'. Ana sayfayı açıp yeniden deneyin.';
      go.hidden=false;
    }
  }
  go.onclick=function(){openApp(556);};
  run();
})();
</script></body></html>
