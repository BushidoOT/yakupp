<!doctype html><html lang="tr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#f4f7f6"/>
<link rel="manifest" href="./manifest.json"/>
<link rel="apple-touch-icon" href="./assets/icon-192.png"/>
<title>Mesaha İO Temizle</title>
<style>body{font-family:system-ui;margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f7f6;color:#101828}.card{background:#fff;border:1px solid #d9e3e1;border-radius:24px;padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.12);text-align:center;max-width:390px}h1{font-size:22px;margin:0 0 8px}p{color:#667085;font-weight:700;line-height:1.45}.spin{width:44px;height:44px;margin:0 auto 14px;border-radius:50%;border:4px solid #d9e3e1;border-top-color:#22c55e;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}</style>
<script src="./js/version.js"></script>
</head><body><div class="card"><div class="spin"></div><h1>Ön bellek onarılıyor…</h1><p>Eski cache temizleniyor. Kayıtlar ve ayarlar silinmez.</p></div><script>
(function(){
  function done(){ setTimeout(function(){ location.replace('./index.html'); },900); }
  function setVersionKeys(){ try{ var v=(window.MESAHA_VERSION&&window.MESAHA_VERSION.version)||'local'; localStorage.setItem('mesaha_last_seen_version',v); localStorage.setItem('mesaha_current_version',v); localStorage.setItem('mesaha_cache_repair_current',String(Date.now())); }catch(e){} }
  try{
    var sw = ('serviceWorker' in navigator) ? navigator.serviceWorker.getRegistrations().then(function(regs){ return Promise.all(regs.map(function(r){ return r.unregister().catch(function(){}); })); }) : Promise.resolve();
    var cc = ('caches' in window) ? caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){ return caches.delete(k); })); }) : Promise.resolve();
    Promise.all([sw,cc]).then(function(){ setVersionKeys(); done(); }).catch(function(){ setVersionKeys(); done(); });
  }catch(e){ setVersionKeys(); done(); }
})();
</script></body></html>
