<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><meta name="theme-color" content="#f4f7f6"><title>Mesaha İO Güncelle</title><style>body{font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#f4f7f6;color:#101828}.card{background:#fff;border:1px solid #d9e3e1;border-radius:24px;padding:24px;box-shadow:0 20px 60px rgba(15,23,42,.12);text-align:center;max-width:390px;margin:16px}h1{font-size:22px;margin:0 0 8px}p{color:#667085;font-weight:700;line-height:1.45}.spin{width:44px;height:44px;margin:0 auto 14px;border-radius:50%;border:4px solid #d9e3e1;border-top-color:#22c55e;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}button{border:0;border-radius:14px;background:#16a34a;color:#fff;font-weight:900;padding:12px 16px;margin-top:12px}</style><script src="./js/version.js"></script><script src="./js/mesaha-update-manager-v527.js"></script></head><body><div class="card"><div class="spin"></div><h1>Mesaha İO güncelleniyor…</h1><p id="status">Mesaha İO cache dosyaları güvenli şekilde yenileniyor. Kayıtlar ve ayarlar silinmez.</p><button id="go" type="button">Ana Sayfayı Aç</button></div><script>(function(){var status=document.getElementById('status');async function run(){try{if(window.MesahaUpdateV527)await window.MesahaUpdateV527.repair();status.textContent='Güncelleme tamamlandı. Uygulama açılıyor…';setTimeout(function(){location.replace('./index.html?updated='+Date.now());},600);}catch(e){status.textContent='Güncelleme tamamlanamadı: '+String(e&&e.message||e);}}document.getElementById('go').onclick=function(){location.replace('./index.html?updated='+Date.now());};run();})();</script></body></html>
