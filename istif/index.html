<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#174a32">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="İstif Alma">
  <title>İstif Alma • Mesaha İO</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="../assets/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="../assets/icon-192.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app" class="app-shell" aria-live="polite"></div>
  <input id="photoPicker" type="file" accept="image/*" multiple hidden>

  <div id="cameraModal" class="modal" hidden>
    <div class="modal-backdrop" data-close-camera></div>
    <section class="camera-sheet" role="dialog" aria-modal="true" aria-label="Uygulama kamerası">
      <header class="sheet-head">
        <div><strong>Uygulama Kamerası</strong><small>Fotoğraf galeriye kaydedilmez</small></div>
        <button class="icon-btn" data-close-camera aria-label="Kapat">✕</button>
      </header>
      <div class="camera-stage">
        <video id="cameraVideo" playsinline autoplay muted></video>
        <div class="camera-guide"><span>İstifi kadraja ortalayın</span></div>
      </div>
      <div class="camera-actions">
        <button id="switchCameraBtn" class="btn ghost">Kamerayı Çevir</button>
        <button id="captureBtn" class="capture-btn" aria-label="Fotoğraf çek"><span></span></button>
        <button id="pickGalleryBtn" class="btn ghost">Galeriden Seç</button>
      </div>
    </section>
  </div>

  <div id="dialogModal" class="modal" hidden>
    <div class="modal-backdrop" data-dialog-close></div>
    <section class="dialog-sheet" role="dialog" aria-modal="true">
      <div id="dialogContent"></div>
    </section>
  </div>

  <section id="printArea" class="print-area" aria-hidden="true"></section>
  <script src="./app.js" defer></script>
</body>
</html>
